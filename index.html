<script src="js/settings.js"></script>
<script>
    // Apply theme on page load
    (function() {
        function applyTheme() {
            let theme = 'original';
            try {
                const saved = localStorage.getItem('puzzleworld_settings');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    theme = parsed.theme || 'original';
                }
            } catch(e) {
                theme = 'original';
            }
            
            // Remove both classes first to avoid conflicts
            document.body.classList.remove('original-theme', 'dark-theme');
            
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                // Preload dark theme background image
                const img = new Image();
                img.src = 'assets/background-dark.png';
            } else {
                document.body.classList.add('original-theme');
            }
        }
        
        applyTheme();
        
        // Listen for settings changes
        window.addEventListener('settingsChanged', function(e) {
            if (e.detail && e.detail.theme) {
                document.body.classList.remove('original-theme', 'dark-theme');
                if (e.detail.theme === 'dark') {
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.add('original-theme');
                }
            }
        });
        
        // Listen for storage events (when settings change in another tab)
        window.addEventListener('storage', function(e) {
            if (e.key === 'puzzleworld_settings') {
                try {
                    const newSettings = JSON.parse(e.newValue);
                    if (newSettings && newSettings.theme) {
                        document.body.classList.remove('original-theme', 'dark-theme');
                        if (newSettings.theme === 'dark') {
                            document.body.classList.add('dark-theme');
                        } else {
                            document.body.classList.add('original-theme');
                        }
                    }
                } catch(err) {
                    console.error('Error parsing storage event:', err);
                }
            }
        });
    })();
</script>

</body>
